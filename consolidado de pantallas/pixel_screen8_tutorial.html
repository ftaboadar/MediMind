<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediMind · Tutorial Interactivo · Google Pixel 10</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-100: #D6EAF8; --blue-300: #7BBDDF; --blue-500: #1A6FA8;
      --blue-700: #0D3F61; --blue-900: #071E2E;
      --green-100: #D4EFDF; --green-300: #5AC99A; --green-500: #2A9D6F; --green-700: #1A6347;
      --orange-100: #FEF3DC; --orange-300: #FFCC72; --orange-500: #F5A623; --orange-700: #B87718;
      --red-100: #FADEDE; --red-300: #EF8F8F; --red-500: #D94F4F; --red-700: #9B2626;
      --bg: #F8FAFB; --card: #FFFFFF; --border: #E2EAF0;
      --text-primary: #071E2E; --text-secondary: #4A6580; --text-muted: #8AA4B8;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #1C1C1E;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 40px 20px;
    }

    /* ── PIXEL 10 SHELL ── */
    .pixel-device {
      position: relative;
      width: 393px; height: 851px;
      background: #0A0A0A;
      border-radius: 52px;
      box-shadow:
        0 0 0 1.5px #2A2A2A,
        0 0 0 3px #1A1A1A,
        0 30px 80px rgba(0,0,0,.7),
        0 10px 30px rgba(0,0,0,.5);
      overflow: hidden;
      flex-shrink: 0;
    }
    .pixel-device::before {
      content: ''; position: absolute;
      right: -4px; top: 160px;
      width: 4px; height: 60px;
      background: #2A2A2A; border-radius: 0 3px 3px 0;
      box-shadow: 0 80px 0 #2A2A2A;
    }
    .pixel-device::after {
      content: ''; position: absolute;
      left: -4px; top: 200px;
      width: 4px; height: 100px;
      background: #2A2A2A; border-radius: 3px 0 0 3px;
      box-shadow: 0 120px 0 #2A2A2A;
    }

    .pixel-screen {
      position: absolute; inset: 6px;
      border-radius: 47px; overflow: hidden;
      background: var(--bg);
      display: flex; flex-direction: column;
    }

    /* ── STATUS BAR ── */
    .status-bar {
      position: relative; height: 44px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px 0;
      flex-shrink: 0; background: var(--bg); z-index: 10;
    }
    .status-time { font-size: 13px; font-weight: 700; color: var(--text-primary); }
    .status-icons { display: flex; gap: 5px; align-items: center; }
    .status-icon.battery {
      width: 22px; height: 11px;
      border: 1.5px solid var(--text-primary);
      border-radius: 3px; position: relative; opacity: .75;
    }
    .status-icon.battery::after {
      content: ''; position: absolute; right: -5px; top: 2px;
      width: 3px; height: 5px;
      background: var(--text-primary); border-radius: 0 2px 2px 0;
    }
    .status-icon.battery::before {
      content: ''; position: absolute; left: 1px; top: 1px; bottom: 1px;
      width: 75%; background: var(--text-primary); border-radius: 1px;
    }

    .punch-hole {
      position: absolute;
      top: 14px; left: 50%; transform: translateX(-50%);
      width: 12px; height: 12px;
      background: #0A0A0A; border-radius: 50%;
      z-index: 20; box-shadow: 0 0 0 1px #1A1A1A;
    }

    .home-indicator {
      position: absolute;
      bottom: 6px; left: 50%; transform: translateX(-50%);
      width: 100px; height: 4px;
      background: #111; border-radius: 100px; z-index: 30;
    }


    .screen-content { flex: 1; display: flex; flex-direction: column; padding: 20px 24px 0; overflow: hidden; }
    .h1 { font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
    .steps { flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .step-card { background: var(--card); border-radius: 14px;
      display: flex; align-items: center; gap: 14px; padding: 14px 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.05); }
    .step-icon { width: 48px; height: 48px; border-radius: 14px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; }
    .step-icon.blue   { background: var(--blue-100);   color: var(--blue-700); }
    .step-icon.green  { background: var(--green-100);  color: var(--green-700); }
    .step-icon.orange { background: var(--orange-100); color: var(--orange-700); }
    .step-body { flex: 1; }
    .step-title { font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 3px; }
    .step-sub { font-size: 12px; color: var(--text-muted); }
    .bottom { padding: 16px 24px 40px; display: flex; flex-direction: column; gap: 10px; }
    .btn-primary { width: 100%; height: 48px; background: var(--blue-500); border: none;
      border-radius: 14px; font-size: 15px; font-weight: 600; color: #FFF;
      font-family: 'Inter',sans-serif; cursor: pointer;
      box-shadow: 0 4px 12px rgba(26,111,168,.3); }
    .btn-secondary { width: 100%; height: 48px; background: transparent;
      border: 1.5px solid var(--blue-500); border-radius: 14px;
      font-size: 15px; font-weight: 600; color: var(--blue-500);
      font-family: 'Inter',sans-serif; cursor: pointer; }
  
  </style>
</head>
<body>
  <div id="Pixel10_Tutorial_Interactivo" class="pixel-device">
    <div class="pixel-screen">
      <div class="status-bar">
        <div class="status-time">9:41</div>
        <div style="width:60px"></div>
        <div class="status-icons">
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
            <rect x="0" y="8" width="3" height="4" rx="1" fill="#071E2E" opacity=".75"/>
            <rect x="4.5" y="5" width="3" height="7" rx="1" fill="#071E2E" opacity=".75"/>
            <rect x="9" y="2" width="3" height="10" rx="1" fill="#071E2E" opacity=".75"/>
            <rect x="13.5" y="0" width="2.5" height="12" rx="1" fill="#071E2E" opacity=".35"/>
          </svg>
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
            <path d="M8 9.5C8.83 9.5 9.5 10.17 9.5 11S8.83 12.5 8 12.5 6.5 11.83 6.5 11 7.17 9.5 8 9.5Z" fill="#071E2E" opacity=".75"/>
            <path d="M3.5 6.5C4.9 5.1 6.85 4.2 8 4.2s3.1.9 4.5 2.3" stroke="#071E2E" stroke-width="1.5" stroke-linecap="round" fill="none" opacity=".75"/>
            <path d="M1 4C3 2 5.4.8 8 .8s5 1.2 7 3.2" stroke="#071E2E" stroke-width="1.5" stroke-linecap="round" fill="none" opacity=".45"/>
          </svg>
          <div class="status-icon battery"></div>
        </div>
      </div>
      <div class="punch-hole"></div>

      <div class="screen-content">
        <div class="h1">Conoce MediMind</div>
        <div class="subtitle">4 pasos clave para empezar</div>
        <div class="steps">
          <div class="step-card">
            <div class="step-icon blue">M</div>
            <div class="step-body">
              <div class="step-title">Agregar medicamentos</div>
              <div class="step-sub">Registra tus medicamentos y dosis</div>
            </div>
          </div>
          <div class="step-card">
            <div class="step-icon green">T</div>
            <div class="step-body">
              <div class="step-title">Confirmar tomas</div>
              <div class="step-sub">Marca cada toma del día como tomada</div>
            </div>
          </div>
          <div class="step-card">
            <div class="step-icon orange">H</div>
            <div class="step-body">
              <div class="step-title">Ver historial</div>
              <div class="step-sub">Consulta tu adherencia semanal y progreso</div>
            </div>
          </div>
          <div class="step-card">
            <div class="step-icon blue">&#9786;</div>
            <div class="step-body">
              <div class="step-title">Vincular médico</div>
              <div class="step-sub">Comparte tu progreso con tu médico tratante</div>
            </div>
          </div>
        </div>
      </div>
      <div class="bottom">
        <button class="btn-primary">Comenzar a usar MediMind</button>
        <button class="btn-secondary">Saltar tutorial</button>
      </div>

      <div class="home-indicator"></div>
    </div>
  </div>
</body>
</html>
