<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>MediMind · Paso 1 de 3</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --blue-100:#D6EAF8;--blue-500:#1A6FA8;--blue-700:#0D3F61;--blue-900:#071E2E;
      --green-100:#D4EFDF;--green-500:#2A9D6F;--green-700:#1A6347;
      --border:#E2EAF0;--bg:#F8FAFB;--card:#FFFFFF;
      --text-primary:#071E2E;--text-secondary:#4A6580;--text-muted:#8AA4B8;
    }
    body{font-family:'Inter',sans-serif;background:#1C1C1E;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;}
    .pixel-device{position:relative;width:393px;height:851px;background:#0A0A0A;border-radius:52px;box-shadow:0 0 0 1.5px #2A2A2A,0 0 0 3px #1A1A1A,0 30px 80px rgba(0,0,0,.7);overflow:hidden;flex-shrink:0;}
    .pixel-device::before{content:'';position:absolute;right:-4px;top:160px;width:4px;height:60px;background:#2A2A2A;border-radius:0 3px 3px 0;box-shadow:0 80px 0 #2A2A2A;}
    .pixel-device::after{content:'';position:absolute;left:-4px;top:200px;width:4px;height:100px;background:#2A2A2A;border-radius:3px 0 0 3px;box-shadow:0 120px 0 #2A2A2A;}
    .pixel-screen{position:absolute;inset:6px;border-radius:47px;overflow:hidden;background:var(--bg);display:flex;flex-direction:column;}
    .status-bar{height:44px;display:flex;align-items:center;justify-content:space-between;padding:12px 24px 0;flex-shrink:0;}
    .status-time{font-size:13px;font-weight:700;color:var(--text-primary);}
    .punch-hole{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:12px;height:12px;background:#0A0A0A;border-radius:50%;z-index:20;}
    /* Nav bar */
    .nav-bar{display:flex;align-items:center;gap:12px;padding:10px 20px 0;border-bottom:1px solid var(--border);padding-bottom:12px;}
    .back-btn{width:36px;height:36px;border-radius:10px;background:var(--blue-100);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .nav-title{font-size:16px;font-weight:700;color:var(--text-primary);}
    .nav-sub{font-size:11px;color:var(--text-muted);}
    /* Progress */
    .progress-bar{height:4px;background:var(--border);margin:0 20px;border-radius:100px;margin-top:12px;}
    .progress-fill{height:100%;background:var(--blue-500);border-radius:100px;width:33%;}
    .progress-label{font-size:11px;color:var(--text-muted);padding:6px 20px 0;margin-bottom:4px;}
    /* Scroll */
    .content{flex:1;overflow-y:auto;scrollbar-width:none;padding:12px 20px 100px;}
    .content::-webkit-scrollbar{display:none;}
    .section-label{font-size:12px;font-weight:700;color:var(--text-secondary);letter-spacing:.3px;margin-bottom:8px;margin-top:16px;}
    /* Search */
    .search-wrap{position:relative;margin-bottom:4px;}
    .search-input{width:100%;padding:13px 14px 13px 42px;border:2px solid var(--blue-500);border-radius:12px;font-size:14px;font-family:'Inter',sans-serif;color:var(--text-primary);background:white;outline:none;}
    .search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);}
    /* Suggestions */
    .suggestions{background:white;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px;box-shadow:0 4px 12px rgba(0,0,0,.06);}
    .suggestion-item{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;font-weight:500;color:var(--text-primary);display:flex;align-items:center;gap:10px;}
    .suggestion-item:last-child{border-bottom:none;}
    .suggestion-item.active{background:var(--blue-100);}
    .suggestion-item.active .s-name{color:var(--blue-700);font-weight:700;}
    .s-dose{font-size:11px;color:var(--text-muted);}
    /* Concentration row */
    .conc-row{display:flex;gap:10px;margin-bottom:16px;}
    .conc-input{flex:1;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;color:var(--text-primary);background:white;text-align:center;}
    .unit-select{display:flex;align-items:center;gap:6px;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;background:white;font-size:13px;font-weight:600;color:var(--text-primary);min-width:80px;justify-content:center;}
    /* Presentation */
    .pres-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
    .pres-opt{padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;display:flex;align-items:center;gap:10px;background:white;cursor:pointer;}
    .pres-opt.selected{border-color:var(--blue-500);background:var(--blue-100);}
    .rb{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
    .rb.on{border:2px solid var(--blue-500);}
    .rb.on::after{content:'';display:block;width:8px;height:8px;border-radius:50%;background:var(--blue-500);}
    .pres-label{font-size:13px;font-weight:500;color:var(--text-primary);}
    .pres-opt.selected .pres-label{color:var(--blue-700);font-weight:700;}
    /* Bottom bar */
    .bottom-bar{position:absolute;bottom:0;left:0;right:0;padding:12px 20px 28px;background:white;border-top:1px solid var(--border);z-index:20;}
    .btn-primary{width:100%;padding:15px;background:linear-gradient(135deg,var(--blue-500),var(--blue-700));color:white;border:none;border-radius:14px;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;box-shadow:0 4px 16px rgba(26,111,168,.35);}
    .home-indicator{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:100px;height:4px;background:#111;border-radius:100px;z-index:30;}
  </style>
</head>
<body>
  <div class="pixel-device">
    <div class="pixel-screen">
      <div class="status-bar">
        <span class="status-time">9:41</span>
        <div style="width:60px"></div>
        <div style="display:flex;gap:5px;align-items:center">
          <svg width="14" height="11" viewBox="0 0 14 11"><rect x="0" y="7" width="2.5" height="4" rx="1" fill="#071E2E" opacity=".7"/><rect x="4" y="4.5" width="2.5" height="6.5" rx="1" fill="#071E2E" opacity=".7"/><rect x="8" y="2" width="2.5" height="9" rx="1" fill="#071E2E" opacity=".7"/><rect x="12" y="0" width="2" height="11" rx="1" fill="#071E2E" opacity=".3"/></svg>
          <svg width="14" height="11" viewBox="0 0 14 11"><path d="M7 8.5a1.5 1.5 0 110 3 1.5 1.5 0 010-3z" fill="#071E2E" opacity=".7"/><path d="M3 5.5C4.2 4.3 5.5 3.6 7 3.6s2.8.7 4 1.9" stroke="#071E2E" stroke-width="1.4" stroke-linecap="round" fill="none" opacity=".7"/><path d="M.5 3C2.3 1.2 4.5.2 7 .2s4.7 1 6.5 2.8" stroke="#071E2E" stroke-width="1.4" stroke-linecap="round" fill="none" opacity=".35"/></svg>
          <div style="width:22px;height:11px;border:1.5px solid #071E2E;border-radius:3px;position:relative;opacity:.7"><div style="position:absolute;left:1px;top:1px;bottom:1px;width:75%;background:#071E2E;border-radius:1px"></div><div style="position:absolute;right:-5px;top:2px;width:3px;height:5px;background:#071E2E;border-radius:0 2px 2px 0"></div></div>
        </div>
      </div>
      <div class="punch-hole"></div>

      <div class="nav-bar">
        <div class="back-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--blue-700)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </div>
        <div><div class="nav-title">Agregar medicamento</div><div class="nav-sub">Ingresa manualmente</div></div>
      </div>

      <div class="progress-bar"><div class="progress-fill"></div></div>
      <div class="progress-label">Paso 1 de 3 — Información del medicamento</div>

      <div class="content">
        <div class="section-label">Nombre del medicamento</div>
        <div class="search-wrap">
          <div class="search-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--blue-500)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          </div>
          <input class="search-input" value="Losartan" readonly/>
        </div>

        <div class="suggestions">
          <div class="suggestion-item active">
            <div class="rb on"></div>
            <div><div class="s-name">Losartan 50mg</div><div class="s-dose">Tabletas · Potasio</div></div>
          </div>
          <div class="suggestion-item">
            <div class="rb"></div>
            <div><div class="s-name">Losartan 100mg</div><div class="s-dose">Tabletas</div></div>
          </div>
          <div class="suggestion-item">
            <div class="rb"></div>
            <div><div class="s-name">Losartan Potásico</div><div class="s-dose">Comprimidos</div></div>
          </div>
        </div>

        <div class="section-label">Concentración</div>
        <div class="conc-row">
          <input class="conc-input" value="50" readonly/>
          <div class="unit-select">
            mg
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
          </div>
        </div>

        <div class="section-label">Presentación</div>
        <div class="pres-grid">
          <div class="pres-opt selected"><div class="rb on"></div><span class="pres-label">Tabletas</span></div>
          <div class="pres-opt"><div class="rb"></div><span class="pres-label">Cápsulas</span></div>
          <div class="pres-opt"><div class="rb"></div><span class="pres-label">Jarabe</span></div>
          <div class="pres-opt"><div class="rb"></div><span class="pres-label">Inyectable</span></div>
          <div class="pres-opt"><div class="rb"></div><span class="pres-label">Otro</span></div>
        </div>
      </div>

      <div class="bottom-bar">
        <button class="btn-primary">Siguiente →</button>
      </div>
      <div class="home-indicator"></div>
    </div>
  </div>
</body>
</html>
