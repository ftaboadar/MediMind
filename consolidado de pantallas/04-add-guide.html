<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>MediMind · Guía Agregar</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --blue-100:#D6EAF8;--blue-300:#7BBDDF;--blue-500:#1A6FA8;--blue-700:#0D3F61;--blue-900:#071E2E;
      --green-100:#D4EFDF;--green-500:#2A9D6F;--green-700:#1A6347;
      --red-500:#D94F4F;--border:#E2EAF0;--bg:#F8FAFB;--text-primary:#071E2E;
      --text-secondary:#4A6580;--text-muted:#8AA4B8;
    }
    body{font-family:'Inter',sans-serif;background:#1C1C1E;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;}
    .pixel-device{position:relative;width:393px;height:851px;background:#0A0A0A;border-radius:52px;box-shadow:0 0 0 1.5px #2A2A2A,0 0 0 3px #1A1A1A,0 30px 80px rgba(0,0,0,.7);overflow:hidden;flex-shrink:0;}
    .pixel-device::before{content:'';position:absolute;right:-4px;top:160px;width:4px;height:60px;background:#2A2A2A;border-radius:0 3px 3px 0;box-shadow:0 80px 0 #2A2A2A;}
    .pixel-device::after{content:'';position:absolute;left:-4px;top:200px;width:4px;height:100px;background:#2A2A2A;border-radius:3px 0 0 3px;box-shadow:0 120px 0 #2A2A2A;}
    .pixel-screen{position:absolute;inset:6px;border-radius:47px;overflow:hidden;background:var(--bg);display:flex;flex-direction:column;}
    /* Status bar */
    .status-bar{height:44px;display:flex;align-items:center;justify-content:space-between;padding:12px 24px 0;flex-shrink:0;background:var(--bg);}
    .status-time{font-size:13px;font-weight:700;color:var(--text-primary);}
    .punch-hole{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:12px;height:12px;background:#0A0A0A;border-radius:50%;z-index:20;}
    /* Home blurred bg */
    .home-bg{flex:1;display:flex;flex-direction:column;background:linear-gradient(180deg,#EDF4FA 0%,#F8FAFB 100%);position:relative;overflow:hidden;}
    /* Dimmed overlay */
    .overlay{position:absolute;inset:0;background:rgba(7,30,46,.55);z-index:5;backdrop-filter:blur(2px);}
    /* Bottom sheet */
    .sheet{position:absolute;bottom:0;left:0;right:0;background:white;border-radius:24px 24px 0 0;padding:0 0 32px;z-index:10;box-shadow:0 -8px 32px rgba(0,0,0,.15);}
    .sheet-handle{width:40px;height:4px;background:#E2EAF0;border-radius:100px;margin:12px auto 20px;}
    .sheet-title{font-size:18px;font-weight:700;color:var(--text-primary);text-align:center;margin-bottom:8px;padding:0 24px;}
    .sheet-sub{font-size:12px;color:var(--text-muted);text-align:center;margin-bottom:24px;padding:0 24px;}
    .option-btn{display:flex;align-items:center;gap:16px;margin:0 20px 12px;padding:18px 20px;border-radius:16px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;}
    .option-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .option-icon.blue{background:var(--blue-100);}
    .option-icon.green{background:var(--green-100);}
    .option-icon.orange{background:#FEF3DC;}
    .option-label{font-size:14px;font-weight:700;color:var(--text-primary);}
    .option-desc{font-size:11px;color:var(--text-muted);margin-top:2px;}
    .cancel-btn{display:block;margin:4px 20px 0;padding:14px;text-align:center;border-radius:14px;border:1.5px solid var(--red-500);color:var(--red-500);font-size:14px;font-weight:600;font-family:'Inter',sans-serif;background:transparent;cursor:pointer;}
    /* BG content (dimmed) */
    .bg-header{display:flex;align-items:flex-start;justify-content:space-between;padding:18px 20px 12px;}
    .bg-date-label{font-size:12px;font-weight:500;color:var(--text-muted);margin-bottom:3px;}
    .bg-date{font-size:20px;font-weight:700;color:var(--text-primary);}
    .avatar-sm{width:36px;height:36px;background:var(--blue-500);border-radius:50%;}
    .bg-card{margin:0 16px;background:linear-gradient(135deg,var(--blue-700),var(--blue-900));border-radius:18px;height:90px;}
    .bg-section{padding:12px 20px 8px;font-size:15px;font-weight:700;color:var(--text-primary);}
    .bg-med{margin:0 16px 8px;background:white;border-radius:14px;height:64px;}
    .home-indicator{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:100px;height:4px;background:#111;border-radius:100px;z-index:30;}
  </style>
</head>
<body>
  <div class="pixel-device">
    <div class="pixel-screen">
      <div class="status-bar">
        <span class="status-time">9:41</span>
        <div style="width:60px"></div>
        <div style="display:flex;gap:5px;align-items:center">
          <svg width="14" height="11" viewBox="0 0 14 11"><rect x="0" y="7" width="2.5" height="4" rx="1" fill="#071E2E" opacity=".7"/><rect x="4" y="4.5" width="2.5" height="6.5" rx="1" fill="#071E2E" opacity=".7"/><rect x="8" y="2" width="2.5" height="9" rx="1" fill="#071E2E" opacity=".7"/><rect x="12" y="0" width="2" height="11" rx="1" fill="#071E2E" opacity=".3"/></svg>
          <svg width="14" height="11" viewBox="0 0 14 11"><path d="M7 8.5a1.5 1.5 0 110 3 1.5 1.5 0 010-3z" fill="#071E2E" opacity=".7"/><path d="M3 5.5C4.2 4.3 5.5 3.6 7 3.6s2.8.7 4 1.9" stroke="#071E2E" stroke-width="1.4" stroke-linecap="round" fill="none" opacity=".7"/><path d="M.5 3C2.3 1.2 4.5.2 7 .2s4.7 1 6.5 2.8" stroke="#071E2E" stroke-width="1.4" stroke-linecap="round" fill="none" opacity=".35"/></svg>
          <div style="width:22px;height:11px;border:1.5px solid #071E2E;border-radius:3px;position:relative;opacity:.7"><div style="position:absolute;left:1px;top:1px;bottom:1px;width:75%;background:#071E2E;border-radius:1px"></div><div style="position:absolute;right:-5px;top:2px;width:3px;height:5px;background:#071E2E;border-radius:0 2px 2px 0"></div></div>
        </div>
      </div>
      <div class="punch-hole"></div>

      <div class="home-bg">
        <!-- Blurred home content -->
        <div class="bg-header">
          <div><div class="bg-date-label">Hoy</div><div class="bg-date">Miércoles</div></div>
          <div class="avatar-sm"></div>
        </div>
        <div class="bg-card"></div>
        <div class="bg-section">Medicamentos del día</div>
        <div class="bg-med"></div>
        <div class="bg-med"></div>

        <!-- Overlay -->
        <div class="overlay"></div>

        <!-- Bottom sheet -->
        <div class="sheet">
          <div class="sheet-handle"></div>
          <div class="sheet-title">¿Cómo agregar el medicamento?</div>
          <div class="sheet-sub">Elige el método que prefieras</div>

          <div class="option-btn">
            <div class="option-icon blue">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--blue-700)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 4 0v2"/><line x1="3" y1="11" x2="21" y2="11"/>
              </svg>
            </div>
            <div><div class="option-label">Escanear código de barras</div><div class="option-desc">Apunta la cámara al empaque</div></div>
          </div>

          <div class="option-btn">
            <div class="option-icon green">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--green-700)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
              </svg>
            </div>
            <div><div class="option-label">Foto de receta</div><div class="option-desc">Toma foto de tu receta médica</div></div>
          </div>

          <div class="option-btn">
            <div class="option-icon orange">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#B87718" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
              </svg>
            </div>
            <div><div class="option-label">Ingresar manualmente</div><div class="option-desc">Escribe los datos del medicamento</div></div>
          </div>

          <button class="cancel-btn">Cancelar</button>
        </div>
      </div>

      <div class="home-indicator"></div>
    </div>
  </div>
</body>
</html>
