<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>MediMind · Éxito</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--blue-100:#D6EAF8;--blue-500:#1A6FA8;--blue-700:#0D3F61;--blue-900:#071E2E;--green-100:#D4EFDF;--green-300:#5AC99A;--green-500:#2A9D6F;--green-700:#1A6347;--orange-100:#FEF3DC;--orange-500:#F5A623;--border:#E2EAF0;--bg:#F8FAFB;--text-primary:#071E2E;--text-secondary:#4A6580;--text-muted:#8AA4B8;}
    body{font-family:'Inter',sans-serif;background:#1C1C1E;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;}
    .pixel-device{position:relative;width:393px;height:851px;background:#0A0A0A;border-radius:52px;box-shadow:0 0 0 1.5px #2A2A2A,0 0 0 3px #1A1A1A,0 30px 80px rgba(0,0,0,.7);overflow:hidden;flex-shrink:0;}
    .pixel-device::before{content:'';position:absolute;right:-4px;top:160px;width:4px;height:60px;background:#2A2A2A;border-radius:0 3px 3px 0;box-shadow:0 80px 0 #2A2A2A;}
    .pixel-device::after{content:'';position:absolute;left:-4px;top:200px;width:4px;height:100px;background:#2A2A2A;border-radius:3px 0 0 3px;box-shadow:0 120px 0 #2A2A2A;}
    .pixel-screen{position:absolute;inset:6px;border-radius:47px;overflow:hidden;background:var(--bg);display:flex;flex-direction:column;}
    .status-bar{height:44px;display:flex;align-items:center;justify-content:space-between;padding:12px 24px 0;flex-shrink:0;background:var(--bg);}
    .status-time{font-size:13px;font-weight:700;color:var(--text-primary);}
    .punch-hole{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:12px;height:12px;background:#0A0A0A;border-radius:50%;z-index:20;}
    /* Home background */
    .home-bg{flex:1;display:flex;flex-direction:column;background:linear-gradient(180deg,#EDF4FA 0%,#F8FAFB 100%);position:relative;}
    .overlay{position:absolute;inset:0;background:rgba(7,30,46,.6);z-index:5;backdrop-filter:blur(3px);}
    /* BG content */
    .bg-header{display:flex;align-items:flex-start;justify-content:space-between;padding:16px 20px 10px;}
    .bg-date-label{font-size:12px;color:var(--text-muted);}
    .bg-date{font-size:20px;font-weight:700;color:var(--text-primary);}
    .avatar-sm{width:36px;height:36px;background:var(--blue-500);border-radius:50%;}
    .bg-adh{margin:0 16px;background:linear-gradient(135deg,var(--blue-700),var(--blue-900));border-radius:18px;height:88px;}
    .bg-sec{padding:10px 20px 6px;font-size:14px;font-weight:700;color:var(--text-primary);}
    .bg-card{margin:0 16px 8px;background:white;border-radius:14px;height:58px;border-left:4px solid var(--green-500);}
    .bg-card2{margin:0 16px 8px;background:white;border-radius:14px;height:58px;border-left:4px solid var(--orange-500);}
    /* Popup */
    .popup{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:320px;background:white;border-radius:24px;padding:32px 24px;z-index:10;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;}
    .check-ring{width:80px;height:80px;border-radius:50%;background:var(--green-100);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
    .check-ring-outer{width:80px;height:80px;border-radius:50%;border:3px solid var(--green-300);display:flex;align-items:center;justify-content:center;}
    .popup-title{font-size:20px;font-weight:700;color:var(--text-primary);margin-bottom:8px;}
    .popup-sub{font-size:13px;color:var(--text-secondary);margin-bottom:20px;line-height:1.5;}
    .popup-med-chip{display:inline-flex;align-items:center;gap:8px;background:var(--green-100);border:1.5px solid var(--green-300);border-radius:100px;padding:8px 16px;margin-bottom:20px;}
    .popup-med-name{font-size:13px;font-weight:700;color:var(--green-700);}
    .time-badge{display:inline-flex;align-items:center;gap:6px;background:var(--blue-100);border-radius:100px;padding:6px 14px;margin-bottom:24px;}
    .time-badge-text{font-size:13px;font-weight:700;color:var(--blue-700);}
    .btn-close{width:100%;padding:14px;background:linear-gradient(135deg,var(--green-500),var(--green-700));color:white;border:none;border-radius:14px;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;box-shadow:0 4px 16px rgba(42,157,111,.35);}
    /* Bottom nav */
    .bottom-nav{position:absolute;bottom:0;left:0;right:0;height:72px;background:white;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding:0 12px 14px;z-index:20;}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;}
    .nav-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;}
    .nav-icon.active{background:var(--blue-100);}
    .nav-label{font-size:10px;font-weight:500;color:var(--text-muted);}
    .nav-label.active{color:var(--blue-500);font-weight:600;}
    .home-indicator{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);width:100px;height:4px;background:#111;border-radius:100px;z-index:30;}
  </style>
</head>
<body>
  <div class="pixel-device">
    <div class="pixel-screen">
      <div class="status-bar">
        <span class="status-time">9:41</span>
        <div style="width:60px"></div>
        <div style="display:flex;gap:5px;align-items:center">
          <svg width="14" height="11" viewBox="0 0 14 11"><rect x="0" y="7" width="2.5" height="4" rx="1" fill="#071E2E" opacity=".7"/><rect x="4" y="4.5" width="2.5" height="6.5" rx="1" fill="#071E2E" opacity=".7"/><rect x="8" y="2" width="2.5" height="9" rx="1" fill="#071E2E" opacity=".7"/><rect x="12" y="0" width="2" height="11" rx="1" fill="#071E2E" opacity=".3"/></svg>
          <svg width="14" height="11" viewBox="0 0 14 11"><path d="M7 8.5a1.5 1.5 0 110 3 1.5 1.5 0 010-3z" fill="#071E2E" opacity=".7"/><path d="M3 5.5C4.2 4.3 5.5 3.6 7 3.6s2.8.7 4 1.9" stroke="#071E2E" stroke-width="1.4" stroke-linecap="round" fill="none" opacity=".7"/><path d="M.5 3C2.3 1.2 4.5.2 7 .2s4.7 1 6.5 2.8" stroke="#071E2E" stroke-width="1.4" stroke-linecap="round" fill="none" opacity=".35"/></svg>
          <div style="width:22px;height:11px;border:1.5px solid #071E2E;border-radius:3px;position:relative;opacity:.7"><div style="position:absolute;left:1px;top:1px;bottom:1px;width:75%;background:#071E2E;border-radius:1px"></div><div style="position:absolute;right:-5px;top:2px;width:3px;height:5px;background:#071E2E;border-radius:0 2px 2px 0"></div></div>
        </div>
      </div>
      <div class="punch-hole"></div>

      <div class="home-bg">
        <!-- bg home -->
        <div class="bg-header">
          <div><div class="bg-date-label">Hoy</div><div class="bg-date">Miércoles</div></div>
          <div class="avatar-sm"></div>
        </div>
        <div class="bg-adh"></div>
        <div class="bg-sec">Medicamentos del día</div>
        <div class="bg-card"></div>
        <div class="bg-card2"></div>

        <!-- Overlay -->
        <div class="overlay"></div>

        <!-- Success Popup -->
        <div class="popup">
          <div class="check-ring">
            <div class="check-ring-outer">
              <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--green-500)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 6L9 17l-5-5"/>
              </svg>
            </div>
          </div>
          <div class="popup-title">¡Medicamento registrado!</div>
          <div class="popup-sub">Tu medicamento fue guardado exitosamente y los recordatorios están activos.</div>

          <div class="popup-med-chip">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="4" y="10" width="16" height="6" rx="3" fill="var(--green-500)"/><rect x="4" y="10" width="8" height="6" rx="3" fill="var(--green-700)"/></svg>
            <span class="popup-med-name">Losartan 50mg · Tabletas</span>
          </div>

          <div style="display:block;margin-bottom:20px">
            <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">Primer recordatorio</div>
            <div class="time-badge">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--blue-700)" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
              <span class="time-badge-text">8:00 PM</span>
            </div>
          </div>

          <button class="btn-close">Cerrar</button>
        </div>

        <!-- Bottom nav (dimmed) -->
        <div class="bottom-nav">
          <div class="nav-item">
            <div class="nav-icon active">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z" fill="var(--blue-500)" opacity=".15" stroke="var(--blue-500)" stroke-width="1.8" stroke-linejoin="round"/><path d="M9 21V12h6v9" stroke="var(--blue-500)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <span class="nav-label active">Inicio</span>
          </div>
          <div class="nav-item">
            <div class="nav-icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="12" width="4" height="9" rx="1.5" fill="var(--text-muted)" opacity=".5"/><rect x="10" y="7" width="4" height="14" rx="1.5" fill="var(--text-muted)" opacity=".5"/><rect x="17" y="3" width="4" height="18" rx="1.5" fill="var(--text-muted)" opacity=".5"/></svg>
            </div>
            <span class="nav-label">Estadísticas</span>
          </div>
          <div class="nav-item">
            <div class="nav-icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="var(--text-muted)" stroke-width="1.8" opacity=".6"/><path d="M4 20c0-4 3.58-7 8-7s8 3 8 7" stroke="var(--text-muted)" stroke-width="1.8" stroke-linecap="round" opacity=".6"/></svg>
            </div>
            <span class="nav-label">Perfil</span>
          </div>
        </div>
      </div>

      <div class="home-indicator"></div>
    </div>
  </div>
</body>
</html>
